# Full stack: Node API + MongoDB + OTP2 transit-engine sidecar.
#
#   docker compose up -d            # build + start everything
#   docker compose up -d otp        # OTP only (serve prebuilt graph)
#   src/scripts/build-otp-graph.sh  # weekly graph rebuild (cron, spec §5)
#
# Services reach each other by name on the default compose network:
#   backend → mongo:27017, otp:8080  (so OTP_BASE_URL/DATABASE_URL are overridden
#   below to those, regardless of the localhost values in .env).
services:
  backend:
    build: .
    container_name: taipei-backend
    # env_file injects the whole .env into the container environment, so
    # `node dist/server.js` sees the vars WITHOUT needing dotenv. The two
    # host-centric values are overridden for the compose network below.
    env_file: .env
    environment:
      OTP_BASE_URL: http://otp:8080
      DATABASE_URL: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/accessible_map?authSource=admin
    ports:
      # Publish the API. Prefix 127.0.0.1: to keep it host-only.
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      mongo:
        condition: service_healthy
      otp:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo
    # Root creds enable auth on first init; the API connects as root with
    # authSource=admin (internal single-app DB). MONGO_ROOT_* come from .env.
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "127.0.0.1:27018:27017"
    # No host port published — only the backend (same network) reaches it.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  otp:
    # Pin the minor version (spec §4.1) — never `latest`.
    # 2.9.0 (Java 25): planConnection supports stop-location origins, which
    # bypasses broken street linking at station plazas (e.g. 台中車站 island).
    image: opentripplanner/opentripplanner:2.9.0
    container_name: otp
    # The official image's entrypoint hardcodes /var/opentripplanner as the
    # data directory — pass flags only, never a path.
    command: ["--load"]
    ports:
      # "主機埠:容器埠" — 主機 8080 已被佔用，改用 18080 對外；容器內仍是
      # 8080，backend 走內網 otp:8080 連，不受影響。
      - "127.0.0.1:18080:8080"
    volumes:
      - ${OTP_DATA_DIR:-/var/otp}:/var/opentripplanner
    environment:
      # Serve heap: national feed + full Taiwan OSM needs ~6–8 GB; a
      # single-city clip runs in 2–4 GB.
      JAVA_TOOL_OPTIONS: "-Xmx${OTP_SERVE_XMX:-6g}"
    healthcheck:
      # The 2.9 image ships no curl/wget; bash /dev/tcp suffices — Grizzly only
      # binds 8080 after the graph is loaded, so TCP-open ⇒ ready for routing.
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    ports:
      - "127.0.0.1:8100:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

volumes:
  mongo-data:
  chroma-data:
